name: JB CI

on:
  workflow_dispatch:
    inputs:
      buildVariant:
        description: 'Select Build Type (Note: Script will build Full, Wear, and AAPSClient)'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    name: Build AAPS
    runs-on: ubuntu-latest
    steps:
      - name: Decode Secrets Keystore Set and Oauth2 to Env
        run: |
          if [ -n "${{ secrets.KEYSTORE_SET }}" ]; then
            echo "🔐 Decoding KEYSTORE_SET..."
            DECODED=$(echo "${{ secrets.KEYSTORE_SET }}" | base64 -d)
            KEYSTORE_BASE64=$(echo "$DECODED" | cut -d'|' -f1)
            KEYSTORE_PASSWORD=$(echo "$DECODED" | cut -d'|' -f2)
            KEY_ALIAS=$(echo "$DECODED" | cut -d'|' -f3)
            KEY_PASSWORD=$(echo "$DECODED" | cut -d'|' -f4)
            echo "KEYSTORE_BASE64=$KEYSTORE_BASE64" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
            echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV
            echo "::add-mask::$KEYSTORE_BASE64"
            echo "::add-mask::$KEYSTORE_PASSWORD"
            echo "::add-mask::$KEY_ALIAS"
            echo "::add-mask::$KEY_PASSWORD"
          else
            echo "KEYSTORE_BASE64=${{ secrets.KEYSTORE_BASE64 }}" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi
          echo "GDRIVE_OAUTH2=${{ secrets.GDRIVE_OAUTH2 }}" >> $GITHUB_ENV

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore file
        run: |
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/keystore.jks"

      - name: Decode GDrive OAuth2
        run: |
          DECODED=$(echo "${{ secrets.GDRIVE_OAUTH2 }}" | base64 -d)
          echo "GDRIVE_CLIENT_ID=$(echo "$DECODED" | cut -d'|' -f1)" >> $GITHUB_ENV
          echo "GDRIVE_REFRESH_TOKEN=$(echo "$DECODED" | cut -d'|' -f2)" >> $GITHUB_ENV

      - name: Get GDrive Access Token
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="$GDRIVE_CLIENT_ID" \
            -d refresh_token="$GDRIVE_REFRESH_TOKEN" \
            -d grant_type=refresh_token)
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r .access_token)
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Build APKs (Full, Wear, and Client)
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleFull${{ github.event.inputs.buildVariant }} \
                    :wear:assembleFull${{ github.event.inputs.buildVariant }} \
                    :app:assembleAapsclient${{ github.event.inputs.buildVariant }} \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx8g -XX:+UseParallelGC" \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/keystore/keystore.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Organize and Rename APKs
        run: |
          mkdir -p output_apks
          TIMESTAMP=$(date +'%Y%m%d')
          GIT_HASH=$(git rev-parse --short HEAD)
          find . -name "*release.apk" -o -name "*debug.apk" | while read -r file; do
            NAME=$(basename "$file")
            # Create a clean name: aaps-flavor-version-date-hash.apk
            NEW_NAME="${NAME%.apk}_${TIMESTAMP}_${GIT_HASH}.apk"
            cp "$file" "output_apks/$NEW_NAME"
          done
          echo "BUILD_DATE=$TIMESTAMP" >> $GITHUB_ENV

      - name: Upload to Google Drive
        run: |
          # 1. Find or Create AAPS Folder
          AAPS_FOLDER_ID=$(curl -s -X GET -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://www.googleapis.com/drive/v3/files?q=name='AAPS'+and+mimeType='application/vnd.google-apps.folder'+and+trashed=false" | jq -r '.files[0].id')
          if [ "$AAPS_FOLDER_ID" == "null" ]; then
            AAPS_FOLDER_ID=$(curl -s -X POST -H "Authorization: Bearer $ACCESS_TOKEN" -H "Content-Type: application/json" \
              -d '{"name": "AAPS", "mimeType": "application/vnd.google-apps.folder"}' "https://www.googleapis.com/drive/v3/files" | jq -r '.id')
          fi

          # 2. Upload each APK found in output_apks
          for file in output_apks/*.apk; do
            FILENAME=$(basename "$file")
            echo "⬆️ Uploading $FILENAME..."
            curl -s -X POST -H "Authorization: Bearer $ACCESS_TOKEN" \
              -F "metadata={ \"name\": \"$FILENAME\", \"parents\": [\"$AAPS_FOLDER_ID\"] };type=application/json;charset=UTF-8" \
              -F "file=@$file;type=application/vnd.android.package-archive" \
              "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart"
          done
          echo "🎉 All APKs uploaded!"
